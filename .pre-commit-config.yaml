repos:
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        exclude: notebooks/
        args: ["--profile", "black", "--filter-files"]

  - repo: https://github.com/ambv/black
    rev: 24.8.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-github-workflows
        args: [--unsafe]