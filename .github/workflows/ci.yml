name: CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"
      - "Dockerfile"
      - ".github/terraform/**"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"
      - "Dockerfile"
      - ".github/terraform/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  test:
    name: Backend Test & Coverage
    runs-on: ubuntu-latest
    needs: pre-commit
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        run: PYTHONPATH=. uv run pytest tests -v --maxfail=1 --disable-warnings --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml

  terraform-check:
    name: Terraform Validate & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform Format Check
        working-directory: .github/terraform
        run: terraform fmt -check -recursive
        # Fails if any .tf file is not properly formatted

      - name: Terraform Validate
        working-directory: .github/terraform
        run: |
          terraform init -backend=false
          terraform validate
        # -backend=false: skip S3 init (no AWS creds needed on PR)

      - name: Run Checkov (security scan)
        uses: bridgecrewio/checkov-action@2fd3901c8feb52417f27f0d9800259a106c1ec1e # v12
        with:
          directory: .github/terraform
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_8,CKV_AWS_126,CKV_AWS_24,CKV_AWS_130,CKV_AWS_260,CKV_AWS_2,CKV2_AWS_20,CKV_AWS_103,CKV_AWS_378,CKV_AWS_382,CKV_AWS_91,CKV_AWS_150,CKV2_AWS_11,CKV2_AWS_12,CKV2_AWS_28
