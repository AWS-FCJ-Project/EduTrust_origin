name: CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"
      - "Dockerfile"
      - ".github/terraform/**"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"
      - "Dockerfile"
      - ".github/terraform/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@f6742a148399e435ad7a008173ef052844ad2f2c # v5.4.0
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@646c83f6aa5ef95202f57a95b8041c280540a97c # v3.0.1

  test:
    name: Backend Test & Coverage
    runs-on: ubuntu-latest
    needs: pre-commit
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # Setup Python 3.11
      - name: Setup Python
        uses: actions/setup-python@f6742a148399e435ad7a008173ef052844ad2f2c # v5.4.0
        with:
          python-version: "3.11"

      # Setup uv
      - name: Setup uv
        uses: astral-sh/setup-uv@883737d5710f6ab1987d37cf9f33f6a297924403 # v5.3.1
        with:
          version: "latest"
          enable-cache: true

      # Install dependencies
      - name: Install dependencies
        run: uv sync --dev --no-cache

      - name: Load backend .env 
        env:
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          if [ -n "${BACKEND_ENV_FILE}" ]; then
            printf '%s' "${BACKEND_ENV_FILE}" > .env
          fi

      - name: Run tests with coverage
        run: PYTHONPATH=. uv run pytest tests -v --maxfail=1 --disable-warnings --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml

  terraform-check:
    name: Terraform Validate & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f62729c728d220ced1f7108839 # v3.1.2
        with:
          terraform_version: "1.10.0"

      - name: Terraform Format Check
        working-directory: .github/terraform
        run: terraform fmt -check -recursive
        # Fails if any .tf file is not properly formatted

      - name: Terraform Validate
        working-directory: .github/terraform
        run: |
          terraform init -backend=false
          terraform validate
        # -backend=false: skip S3 init (no AWS creds needed on PR)

      - name: Run Checkov (security scan)
        uses: bridgecrewio/checkov-action@17960fc50e2418e95819717df37119e7a9354e60 # v12.2987.0
        with:
          directory: .github/terraform
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_2,CKV_AWS_24,CKV_AWS_91,CKV_AWS_103,CKV_AWS_126,CKV_AWS_130,CKV_AWS_150,CKV_AWS_260,CKV_AWS_378,CKV2_AWS_11,CKV2_AWS_12,CKV2_AWS_20,CKV2_AWS_28
