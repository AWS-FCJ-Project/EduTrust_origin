name: CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"
      - "Dockerfile"
      - ".github/terraform/**"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"
      - "Dockerfile"
      - ".github/terraform/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@646c83f6aa5ef95202f57a95b8041c280540a97c # v3.0.1

  test:
    name: Backend Test & Coverage
    runs-on: ubuntu-latest
    needs: pre-commit
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # Loại bỏ setup-python, dùng setup-uv v5 với mã SHA chuẩn
      - name: Setup uv
        uses: astral-sh/setup-uv@f9864239851639ec9b08f43501716949b29e0136 # v5.2.2
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python and Dependencies
        # uv sẽ tự tải Python 3.11 nếu chưa có. 
        # Dùng --frozen để cài đặt chính xác theo uv.lock
        run: |
          uv python install 3.11
          uv sync --dev --frozen

      - name: Load backend .env 
        env:
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          if [ -n "${BACKEND_ENV_FILE}" ]; then
            printf '%s' "${BACKEND_ENV_FILE}" > .env
          fi

      - name: Run tests with coverage
        run: uv run pytest tests -v --maxfail=1 --disable-warnings --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml

  terraform-check:
    name: Terraform Validate & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        # Đã sửa lại SHA chính xác cho hashicorp/setup-terraform v3.1.2
        uses: hashicorp/setup-terraform@a9fd3012d607951065f412c26257367d54032d0c 
        with:
          terraform_version: "1.10.0"

      - name: Terraform Format Check
        working-directory: .github/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: .github/terraform
        run: |
          terraform init -backend=false
          terraform validate

      - name: Run Checkov (security scan)
        uses: bridgecrewio/checkov-action@17960fc50e2418e95819717df37119e7a9354e60 # v12.2987.0
        with:
          directory: .github/terraform
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_2,CKV_AWS_24,CKV_AWS_91,CKV_AWS_103,CKV_AWS_126,CKV_AWS_130,CKV_AWS_150,CKV_AWS_260,CKV_AWS_378,CKV2_AWS_11,CKV2_AWS_12,CKV2_AWS_20,CKV2_AWS_28