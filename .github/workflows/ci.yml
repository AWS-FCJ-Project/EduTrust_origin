name: CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"
      - "Dockerfile"
      - ".github/terraform/**"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"
      - "Dockerfile"
      - ".github/terraform/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@f6771096fe839c00b209d72195033166567d165f # v5.4.0
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@2c7b380e227038e9d3a778ce3f6f9479e0e37703 # v3.0.1

  test:
    name: Backend Test & Coverage
    runs-on: ubuntu-latest
    needs: pre-commit
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@f6771096fe839c00b209d72195033166567d165f # v5.4.0
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@1edb4ca450682fa00b3e7bc23e351980a37db875 # v4.0.0

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        run: PYTHONPATH=. uv run pytest tests -v --maxfail=1 --disable-warnings --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml

  terraform-check:
    name: Terraform Validate & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f62e5133f1720d7ede4739b6e1 # v3.1.2
        with:
          terraform_version: "1.10.0"

      - name: Terraform Format Check
        working-directory: .github/terraform
        run: terraform fmt -check -recursive
        # Fails if any .tf file is not properly formatted

      - name: Terraform Validate
        working-directory: .github/terraform
        run: |
          terraform init -backend=false
          terraform validate
        # -backend=false: skip S3 init (no AWS creds needed on PR)

      - name: Run Checkov (security scan)
        uses: bridgecrewio/checkov-action@097b693e5ec726c9f697cc6e828d1505315f6d7e # v12
        with:
          directory: .github/terraform
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_8,CKV_AWS_126,CKV_AWS_24,CKV_AWS_130,CKV_AWS_260,CKV_AWS_2,CKV2_AWS_20,CKV_AWS_103,CKV_AWS_378,CKV_AWS_382,CKV_AWS_91,CKV_AWS_150,CKV2_AWS_11,CKV2_AWS_12,CKV2_AWS_28
