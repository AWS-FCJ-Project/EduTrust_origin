name: CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"
      - "Dockerfile"
      - ".github/terraform/**"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/**"
      - "Dockerfile"
      - ".github/terraform/**"
  workflow_dispatch:


jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  test:
    name: Backend Test & Coverage
    runs-on: ubuntu-latest
    needs: pre-commit
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        run: PYTHONPATH=. uv run pytest tests -v --maxfail=1 --disable-warnings --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml

  terraform-check:
    name: Terraform Validate & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform Format Check
        working-directory: .github/terraform
        run: terraform fmt -check -recursive
        # Fails if any .tf file is not properly formatted

      - name: Terraform Validate
        working-directory: .github/terraform
        run: |
          terraform init -backend=false
          terraform validate
        # -backend=false: skip S3 init (no AWS creds needed on PR)

      - name: Run Checkov (security scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .github/terraform
          framework: terraform
          soft_fail: false
          skip_check: >-
            CKV_AWS_8,CKV_AWS_126,CKV_AWS_24
