name: Deploy (EC2)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: false

env:
  TF_DIR: .github/terraform
  CONTAINER_NAME: aws-fcj-backend

jobs:
  terraform:
    name: Provision/Update EC2 (Terraform apply)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      instance_id: ${{ steps.tf_output.outputs.instance_id }}
      aws_region: ${{ steps.tf_output.outputs.aws_region }}
      ecr_repository_url: ${{ steps.tf_output.outputs.ecr_repository_url }}
      ecr_tag_immutable: ${{ steps.ecr_vars.outputs.ecr_tag_immutable }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TERRAFORM_VARS: ${{ secrets.TERRAFORM_VARIABLES }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Write terraform.tfvars from secret
        working-directory: ${{ env.TF_DIR }}
        run: printf "%s\n" "$TERRAFORM_VARS" > terraform.tfvars

      - name: Read ECR tag immutability (ecr_tag_immutable)
        id: ecr_vars
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail

          IMMUTABLE=""
          if [ -f terraform.tfvars ]; then
            IMMUTABLE="$(awk -F= '
              $1 ~ /^[[:space:]]*ecr_tag_immutable[[:space:]]*$/ {
                v=$2
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                gsub(/\"/, "", v)
                print v
                exit
              }' terraform.tfvars || true)"
          fi

          IMMUTABLE="${IMMUTABLE:-true}"
          case "$IMMUTABLE" in
            true|false) ;;
            *) echo "Invalid ecr_tag_immutable value: $IMMUTABLE" >&2; exit 1 ;;
          esac

          echo "ecr_tag_immutable=$IMMUTABLE" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Import existing ECR repository (if already created)
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail

          # Prefer reading from terraform.tfvars (written from secret); fall back to default.
          if [ -f terraform.tfvars ]; then
            REPO_NAME="$(awk -F= '
              $1 ~ /^[[:space:]]*ecr_repository_name[[:space:]]*$/ {
                v=$2
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                gsub(/\"/, "", v)
                print v
                exit
              }' terraform.tfvars || true)"
          fi

          REPO_NAME="${REPO_NAME:-edutrust-backend}"
          echo "ECR repo name: $REPO_NAME"

          if aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1; then
            if terraform state show aws_ecr_repository.backend >/dev/null 2>&1; then
              echo "ECR repo already in Terraform state, skipping import."
            else
              echo "ECR repo exists in AWS but not in state; importing..."
              terraform import aws_ecr_repository.backend "$REPO_NAME"
            fi
          else
            echo "ECR repo not found in AWS; Terraform will create it."
          fi

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs (instance id + region)
        id: tf_output
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"
          echo "aws_region=$(terraform output -raw aws_region)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

  build:
    name: Build & Push backend image (ECR)
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image: ${{ steps.image_vars.outputs.image }}
      image_tag: ${{ steps.image_vars.outputs.image_tag }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ needs.terraform.outputs.aws_region }}
      AWS_DEFAULT_REGION: ${{ needs.terraform.outputs.aws_region }}
      ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.ecr_repository_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image variables
        id: image_vars
        run: |
          echo "image=${ECR_REPOSITORY_URL}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ needs.terraform.outputs.aws_region }}

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute Docker tags
        id: docker_tags
        run: |
          set -euo pipefail

          SHA_TAG="${{ steps.image_vars.outputs.image }}:${{ steps.image_vars.outputs.image_tag }}"
          if [ "${{ needs.terraform.outputs.ecr_tag_immutable }}" = "true" ]; then
            TAGS="$SHA_TAG"
          else
            TAGS="$SHA_TAG\n${{ steps.image_vars.outputs.image }}:latest"
          fi

          {
            echo "tags<<EOF"
            printf "%b\n" "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}

  deploy:
    name: Deploy backend container (SSM)
    runs-on: ubuntu-latest
    needs: [terraform, build]
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy to EC2 via AWS Systems Manager (no SSH)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ needs.terraform.outputs.aws_region }}
          AWS_DEFAULT_REGION: ${{ needs.terraform.outputs.aws_region }}
          INSTANCE_ID: ${{ needs.terraform.outputs.instance_id }}
          APP_DIR: ${{ secrets.APP_DIR }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
          IMAGE: ${{ needs.build.outputs.image }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          set -euo pipefail

          echo "Waiting for SSM agent to be online for instance: $INSTANCE_ID"
          for _ in {1..30}; do
            STATUS="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)"
            if [ "$STATUS" = "Online" ]; then
              break
            fi
            sleep 10
          done

          if [ "${STATUS:-}" != "Online" ]; then
            echo "SSM agent is not online yet (PingStatus=$STATUS). Check instance role + outbound 443 + SSM agent."
            exit 1
          fi

          ECR_REGISTRY="${IMAGE%/*}"
          ECR_PASSWORD="$(aws ecr get-login-password --region "$AWS_REGION")"

          ENV_B64="$(printf "%s" "$BACKEND_ENV_FILE" | base64 -w0)"
          COMMANDS="$(jq -n \
            --arg env_b64 "$ENV_B64" \
            --arg app_dir "${APP_DIR:-aws-fcj-project}" \
            --arg img "$IMAGE:$IMAGE_TAG" \
            --arg registry "$ECR_REGISTRY" \
            --arg token "$ECR_PASSWORD" \
            --arg cname "${CONTAINER_NAME}" \
            '[
              "set -eu",
              "export DEBIAN_FRONTEND=noninteractive",
              # Ensure Docker exists (SSM runs as root; no SSH key needed).
              "if ! command -v docker >/dev/null 2>&1; then (apt-get update -y || true); apt-get install -y ca-certificates curl || true; curl -fsSL https://get.docker.com -o /tmp/get-docker.sh; sh /tmp/get-docker.sh; fi",
              "systemctl enable --now docker || true",
              ("TARGET_DIR=" + $app_dir),
              "mkdir -p \"$TARGET_DIR\"",
              ("echo \"" + $env_b64 + "\" | base64 -d > \"$TARGET_DIR/.env\""),
              ("echo \"" + $token + "\" | docker login --username AWS --password-stdin \"" + $registry + "\""),
              ("docker stop \"" + $cname + "\" || true"),
              ("docker rm \"" + $cname + "\" || true"),
              "docker image prune -af || true",
              "docker builder prune -af || true",
              ("docker pull \"" + $img + "\""),
              ("docker run -d --name \"" + $cname + "\" --restart unless-stopped -p 8000:8000 --env-file \"$TARGET_DIR/.env\" \"" + $img + "\""),
              "docker image prune -f",
              ("docker ps | grep \"" + $cname + "\"")
            ]')"

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\": $COMMANDS}" \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM Command ID: $COMMAND_ID"
          # Wait/poll and always print output on failure (waiter exits 255 on Failed before logs are fetched).
          FINAL_STATUS=""
          for _ in {1..60}; do
            FINAL_STATUS="$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || true)"
            case "$FINAL_STATUS" in
              Success|Failed|Cancelled|TimedOut|Undeliverable|Terminated) break ;;
              *) sleep 5 ;;
            esac
          done

          echo "Deploy status: ${FINAL_STATUS:-unknown}"

          STDOUT="$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text 2>/dev/null || true)"
          STDERR="$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text 2>/dev/null || true)"

          echo "---- SSM STDOUT ----"
          printf "%s\n" "${STDOUT:-}"
          echo "---- SSM STDERR ----"
          printf "%s\n" "${STDERR:-}"

          [ "$FINAL_STATUS" = "Success" ]
