name: Deploy (EC2)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      build_ami:
        description: 'Build Base AMI with Packer before deploying?'
        required: false
        type: boolean
        default: false
permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: false

env:
  TF_DIR: .github/terraform
  CONTAINER_NAME: aws-fcj-backend
  TF_STATE_BUCKET: backend-tf-state-bucket-641458060045
  TF_STATE_REGION: ap-southeast-1

jobs:
  packer:
    name: Build Base AMI (Packer)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Run Packer Init
        working-directory: .github/packer
        run: packer init .

      - name: Run Packer Build
        working-directory: .github/packer
        run: |
          # 1. Compute Hash and Check for existing AMI
          PACKER_HASH=$(sha256sum base-ami.pkr.hcl | awk '{print $1}')
          echo "Computed Packer Hash: $PACKER_HASH"
          
          EXISTING_AMI=$(aws ec2 describe-images --owners self --filters "Name=tag:PackerHash,Values=$PACKER_HASH" --query "Images[0].ImageId" --output text)
          
          FORCE_BUILD="${{ github.event.inputs.build_ami }}"
          if [ "$FORCE_BUILD" != "true" ] && [ "$EXISTING_AMI" != "None" ] && [ -n "$EXISTING_AMI" ]; then
            echo "AMI with exact config match $PACKER_HASH exists ($EXISTING_AMI). Skipping delete and build."
            exit 0
          fi

          # 2. Create Temporary Networking for Packer
          echo "Creating temporary Networking for Packer build..."
          VPC_ID=$(aws ec2 create-vpc --cidr-block 10.99.0.0/16 --tag-specifications 'ResourceType=vpc,Tags=[{Key=Name,Value=PackerTempVPC}]' --query Vpc.VpcId --output text)
          echo "VPC_ID=$VPC_ID" >> "$GITHUB_ENV"
          
          IGW_ID=$(aws ec2 create-internet-gateway --tag-specifications 'ResourceType=internet-gateway,Tags=[{Key=Name,Value=PackerTempIGW}]' --query InternetGateway.InternetGatewayId --output text)
          echo "IGW_ID=$IGW_ID" >> "$GITHUB_ENV"
          aws ec2 attach-internet-gateway --vpc-id "$VPC_ID" --internet-gateway-id "$IGW_ID"
          
          SUBNET_ID=$(aws ec2 create-subnet --vpc-id "$VPC_ID" --cidr-block 10.99.1.0/24 --tag-specifications 'ResourceType=subnet,Tags=[{Key=Name,Value=PackerTempSubnet}]' --query Subnet.SubnetId --output text)
          echo "SUBNET_ID=$SUBNET_ID" >> "$GITHUB_ENV"
          aws ec2 modify-subnet-attribute --subnet-id "$SUBNET_ID" --map-public-ip-on-launch
          
          RTB_ID=$(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$VPC_ID" --query "RouteTables[0].RouteTableId" --output text)
          aws ec2 create-route --route-table-id "$RTB_ID" --destination-cidr-block 0.0.0.0/0 --gateway-id "$IGW_ID" >/dev/null
          
          echo "Found VPC_ID: $VPC_ID"
          echo "Found SUBNET_ID: $SUBNET_ID"
          
          # 3. Deregister old versions of EduTrust-Base-AMI (to avoid name collision)
          echo "Deregistering old versions of EduTrust-Base-AMI..."
          OLD_AMIS_JSON=$(aws ec2 describe-images --owners self --filters "Name=tag:Name,Values=EduTrust-Base-AMI" --query "Images[*].[ImageId,BlockDeviceMappings[*].Ebs.SnapshotId]" --output json || echo "[]")
          
          if [ "$OLD_AMIS_JSON" != "[]" ] && [ -n "$OLD_AMIS_JSON" ]; then
            IMAGE_IDS=$(echo "$OLD_AMIS_JSON" | jq -r '.[][0]')
            for ami_id in $IMAGE_IDS; do
              if [ -n "$ami_id" ] && [ "$ami_id" != "null" ]; then
                echo "Deregistering old AMI: $ami_id"
                aws ec2 deregister-image --image-id "$ami_id" || true
              fi
            done
            
            SNAPSHOT_IDS=$(echo "$OLD_AMIS_JSON" | jq -r '.[][1][]')
            for snap_id in $SNAPSHOT_IDS; do
              if [ -n "$snap_id" ] && [ "$snap_id" != "null" ]; then
                echo "Deleting old snapshot: $snap_id"
                aws ec2 delete-snapshot --snapshot-id "$snap_id" || true
              fi
            done
          fi
          
          # 4. Build new AMI
          echo "Building new AMI with hash: $PACKER_HASH"
          packer build -var "vpc_id=$VPC_ID" -var "subnet_id=$SUBNET_ID" -var "packer_hash=$PACKER_HASH" base-ami.pkr.hcl

      - name: Cleanup Packer Build Network
        if: always() && env.VPC_ID != ''
        run: |
          echo "Cleaning up temporary VPC resources..."
          # Cleanup in reverse order of creation
          # Wait a few seconds for Packer-provisioned SG to be fully cleared by AWS
          sleep 10
          aws ec2 delete-subnet --subnet-id "$SUBNET_ID" || true
          aws ec2 detach-internet-gateway --internet-gateway-id "$IGW_ID" --vpc-id "$VPC_ID" || true
          aws ec2 delete-internet-gateway --internet-gateway-id "$IGW_ID" || true
          aws ec2 delete-vpc --vpc-id "$VPC_ID" || true


  terraform:
    name: Provision/Update EC2 (Terraform apply)
    runs-on: ubuntu-latest
    needs: packer
    if: always() && (needs.packer.result == 'success' || needs.packer.result == 'skipped') && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    outputs:
      asg_name: ${{ steps.tf_output.outputs.asg_name }}
      aws_region: ${{ steps.tf_output.outputs.aws_region }}
      ecr_repository_url: ${{ steps.tf_output.outputs.ecr_repository_url }}
      backend_port: ${{ steps.tf_output.outputs.backend_port }}
      secrets_kms_key_arn: ${{ steps.tf_output.outputs.secrets_kms_key_arn }}
      alb_dns_name: ${{ steps.tf_output.outputs.alb_dns_name }}
      api_domain_name: ${{ steps.tf_output.outputs.api_domain_name }}
      backend_target_group_arn: ${{ steps.tf_output.outputs.backend_target_group_arn }}
      ecr_tag_immutable: ${{ steps.ecr_vars.outputs.ecr_tag_immutable }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-1
      TERRAFORM_VARS: ${{ secrets.TERRAFORM_VARIABLES }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('.github/terraform/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Write terraform.tfvars from secret
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: printf "%s\n" "$TERRAFORM_VARS" > terraform.tfvars

      - name: Read ECR tag immutability (ecr_tag_immutable)
        id: ecr_vars
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          IMMUTABLE=""
          if [ -f terraform.tfvars ]; then
            IMMUTABLE="$(awk -F= '
              $1 ~ /^[[:space:]]*ecr_tag_immutable[[:space:]]*$/ {
                v=$2
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                gsub(/\"/, "", v)
                print v
                exit
              }' terraform.tfvars || true)"
          fi
          IMMUTABLE="${IMMUTABLE:-true}"
          case "$IMMUTABLE" in
            true|false) ;;
            *) echo "Invalid ecr_tag_immutable value: $IMMUTABLE" >&2; exit 1 ;;
          esac
          echo "ecr_tag_immutable=$IMMUTABLE" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Ensure Terraform State Bucket Exists
        shell: bash
        run: |
          set -euo pipefail

          bucket="${TF_STATE_BUCKET}"
          region="${TF_STATE_REGION}"

          echo "Checking Terraform state bucket: ${bucket}"
          # Use us-east-1/global endpoint for existence check (avoids false negatives due to region redirects).
          if aws s3api head-bucket --bucket "${bucket}" --region us-east-1 2>/dev/null; then
            echo "Bucket exists, skipping create."
          else
            echo "Bucket missing, creating: ${bucket} (region: ${region})"
            if [ "${region}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${bucket}" --region "${region}"
            else
              aws s3api create-bucket \
                --bucket "${bucket}" \
                --region "${region}" \
                --create-bucket-configuration LocationConstraint="${region}"
            fi
          fi

          # Hardening / best practices for state storage.
          aws s3api put-public-access-block \
            --bucket "${bucket}" \
            --public-access-block-configuration '{
              "BlockPublicAcls": true,
              "IgnorePublicAcls": true,
              "BlockPublicPolicy": true,
              "RestrictPublicBuckets": true
            }'

          aws s3api put-bucket-versioning \
            --bucket "${bucket}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${bucket}" \
            --server-side-encryption-configuration '{
              "Rules": [
                {
                  "ApplyServerSideEncryptionByDefault": { "SSEAlgorithm": "AES256" }
                }
              ]
            }'

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Import existing ECR repository (if already created)
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          if [ -f terraform.tfvars ]; then
            REPO_NAME="$(awk -F= '
              $1 ~ /^[[:space:]]*ecr_repository_name[[:space:]]*$/ {
                v=$2
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                gsub(/\"/, "", v)
                print v
                exit
              }' terraform.tfvars || true)"
          fi
          REPO_NAME="${REPO_NAME:-edutrust-backend}"
          echo "ECR repo name: $REPO_NAME"
          if aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1; then
            if terraform state show aws_ecr_repository.backend >/dev/null 2>&1; then
              echo "ECR repo already in Terraform state, skipping import."
            else
              echo "ECR repo exists in AWS but not in state; importing..."
              terraform import aws_ecr_repository.backend "$REPO_NAME"
            fi
          else
            echo "ECR repo not found in AWS; Terraform will create it."
          fi

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -input=false

      - name: Get Terraform Outputs
        id: tf_output
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "asg_name=$(terraform output -raw backend_asg_name)" >> "$GITHUB_OUTPUT"
          echo "aws_region=$(terraform output -raw aws_region)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "backend_port=$(terraform output -raw backend_port)" >> "$GITHUB_OUTPUT"
          echo "secrets_kms_key_arn=$(terraform output -raw secrets_kms_key_arn)" >> "$GITHUB_OUTPUT"
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
          # terraform output -raw prints "null" for null values, which is OK for downstream logic
          echo "api_domain_name=$(terraform output -raw api_domain_name)" >> "$GITHUB_OUTPUT"
          echo "backend_target_group_arn=$(terraform output -raw backend_target_group_arn)" >> "$GITHUB_OUTPUT"

  build:
    name: Build & Push backend image (ECR)
    runs-on: ubuntu-latest
    needs: terraform
    if: always() && needs.terraform.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    outputs:
      image: ${{ steps.image_vars.outputs.image }}
      image_tag: ${{ steps.image_vars.outputs.image_tag }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ needs.terraform.outputs.aws_region }}
      AWS_DEFAULT_REGION: ${{ needs.terraform.outputs.aws_region }}
      ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.ecr_repository_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image variables
        id: image_vars
        run: |
          echo "image=${ECR_REPOSITORY_URL}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ needs.terraform.outputs.aws_region }}

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute Docker tags
        id: docker_tags
        env:
          IMAGE: ${{ steps.image_vars.outputs.image }}
          IMAGE_TAG: ${{ steps.image_vars.outputs.image_tag }}
          ECR_TAG_IMMUTABLE: ${{ needs.terraform.outputs.ecr_tag_immutable }}
        run: |
          set -euo pipefail
          SHA_TAG="${IMAGE}:${IMAGE_TAG}"
          if [ "$ECR_TAG_IMMUTABLE" = "true" ]; then
            TAGS="$SHA_TAG"
          else
            TAGS="$SHA_TAG\n${IMAGE}:latest"
          fi
          {
            echo "tags<<EOF"
            printf "%b\n" "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ASG (Rolling Update)
    runs-on: ubuntu-latest
    needs: [terraform, build]
    if: always() && needs.terraform.result == 'success' && needs.build.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ needs.terraform.outputs.aws_region }}
      ASG_NAME: ${{ needs.terraform.outputs.asg_name }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.ecr_repository_url }}
      ALB_DNS_NAME: ${{ needs.terraform.outputs.alb_dns_name }}
      API_DOMAIN_NAME: ${{ needs.terraform.outputs.api_domain_name }}
      BACKEND_TARGET_GROUP_ARN: ${{ needs.terraform.outputs.backend_target_group_arn }}
      BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
      SECRETS_KMS_KEY_ARN: ${{ needs.terraform.outputs.secrets_kms_key_arn }}
      TF_DIR: .github/terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Environment Variables in SSM
        run: |
          aws ssm put-parameter \
            --name "/edutrust/backend/env" \
            --value "$BACKEND_ENV_FILE" \
            --type "SecureString" \
            --key-id "$SECRETS_KMS_KEY_ARN" \
            --overwrite

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('.github/terraform/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Update Launch Template with new tag
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VARS: ${{ secrets.TERRAFORM_VARIABLES }}
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: |
          printf "%s\n" "$TF_VARS" > terraform.tfvars
          terraform init
          terraform apply -auto-approve -input=false -var="backend_image_tag=$IMAGE_TAG"

      - name: Start ASG Instance Refresh
        run: |
          set -euo pipefail

          asg="${ASG_NAME}"
          region="${AWS_REGION}"
          tg_arn="${BACKEND_TARGET_GROUP_ARN}"

          inprogress_id() {
            aws autoscaling describe-instance-refreshes \
              --region "${region}" \
              --auto-scaling-group-name "${asg}" \
              --query "InstanceRefreshes[?Status=='InProgress'] | [0].InstanceRefreshId" \
              --output text 2>/dev/null || true
          }

          healthy_targets_before_refresh() {
            local states
            states="$(aws elbv2 describe-target-health \
              --region "${region}" \
              --target-group-arn "${tg_arn}" \
              --query 'TargetHealthDescriptions[*].TargetHealth.State' \
              --output text 2>/dev/null || true)"
            echo "${states}" | tr '\t' '\n' | grep -c '^healthy$' || true
          }

          refresh_history_count() {
            aws autoscaling describe-instance-refreshes \
              --region "${region}" \
              --auto-scaling-group-name "${asg}" \
              --query 'length(InstanceRefreshes)' \
              --output text 2>/dev/null || echo 0
          }

          bootstrap_healthy_count="$(healthy_targets_before_refresh)"
          existing_refresh_history="$(refresh_history_count)"
          if [ "${bootstrap_healthy_count}" -eq 0 ] && [ "${existing_refresh_history}" -eq 0 ]; then
            echo "No healthy targets detected yet. Treating this as initial bootstrap and skipping instance refresh."
            echo "ROLLING_REFRESH_STARTED=false" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Checking for in-progress instance refresh for ASG: ${asg}"
          current_refresh_id="$(inprogress_id)"
          if [ -n "${current_refresh_id}" ] && [ "${current_refresh_id}" != "None" ]; then
            echo "A refresh (${current_refresh_id}) is already in progress. Cancelling it..."
            aws autoscaling cancel-instance-refresh --region "${region}" --auto-scaling-group-name "${asg}" || true
            echo "Waiting for cancellation to process..."
            for _ in $(seq 1 20); do
              sleep 15
              still="$(inprogress_id)"
              if [ -z "${still}" ] || [ "${still}" = "None" ]; then
                echo "No in-progress refresh detected."
                break
              fi
              echo "Still in progress: ${still}"
            done
          fi

          echo "Starting new instance refresh for ASG: ${asg}"
          refresh_id="$(aws autoscaling start-instance-refresh \
            --region "${region}" \
            --auto-scaling-group-name "${asg}" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 90}' \
            --query "InstanceRefreshId" \
            --output text)"
          echo "Instance Refresh ID: ${refresh_id}"
          echo "ROLLING_REFRESH_STARTED=true" >> "$GITHUB_ENV"

          started_at="$(date +%s)"
          last_pct=""
          last_change_at="${started_at}"

          # Avoid infinite loops: if ASG/ALB health is slow, we'll proceed to the rollout verification step,
          # which checks target group health + /health end-to-end.
          max_wait_seconds=$((60 * 60))       # 60 minutes
          stuck_100_seconds=$((10 * 60))      # 10 minutes at 100% but still InProgress

          while true; do
            status="$(aws autoscaling describe-instance-refreshes \
              --region "${region}" \
              --auto-scaling-group-name "${asg}" \
              --instance-refresh-ids "${refresh_id}" \
              --query "InstanceRefreshes[0].Status" \
              --output text)"

            pct="$(aws autoscaling describe-instance-refreshes \
              --region "${region}" \
              --auto-scaling-group-name "${asg}" \
              --instance-refresh-ids "${refresh_id}" \
              --query "InstanceRefreshes[0].PercentageComplete" \
              --output text)"

            now="$(date +%s)"
            if [ "${pct}" != "${last_pct}" ]; then
              last_pct="${pct}"
              last_change_at="${now}"
            fi

            echo "Refresh status: ${status} (${pct}% complete)"

            case "${status}" in
              Successful)
                echo "Instance refresh successful."
                break
                ;;
              Failed|Cancelled|TimedOut)
                echo "Instance refresh ${status}."
                reason="$(aws autoscaling describe-instance-refreshes \
                  --region "${region}" \
                  --auto-scaling-group-name "${asg}" \
                  --instance-refresh-ids "${refresh_id}" \
                  --query "InstanceRefreshes[0].StatusReason" \
                  --output text || true)"
                echo "Reason: ${reason}"
                exit 1
                ;;
              InProgress|Pending)
                # If AWS reports 100% complete but doesn't flip to Successful, don't spam logs forever.
                if [ "${pct}" = "100" ] && [ $((now - last_change_at)) -ge ${stuck_100_seconds} ]; then
                  echo "Refresh is stuck at 100% InProgress for >=10m; proceeding to rollout verification."
                  break
                fi

                if [ $((now - started_at)) -ge ${max_wait_seconds} ]; then
                  echo "Timed out waiting for instance refresh after ${max_wait_seconds}s; proceeding to rollout verification."
                  aws autoscaling describe-instance-refreshes \
                    --region "${region}" \
                    --auto-scaling-group-name "${asg}" \
                    --instance-refresh-ids "${refresh_id}" \
                    --output table || true
                  break
                fi

                sleep 30
                ;;
              *)
                echo "Unknown refresh status: ${status}. Proceeding to rollout verification."
                break
                ;;
            esac
          done

      - name: Verify rollout (ECR image exists, targets healthy, /health OK)
        shell: bash
        run: |
          set -euo pipefail

          repo_url="${ECR_REPOSITORY_URL}"
          repo_name="${repo_url#*/}"
          tag="${IMAGE_TAG}"
          tg_arn="${BACKEND_TARGET_GROUP_ARN}"
          asg="${ASG_NAME}"
          region="${AWS_REGION}"
          alb_dns="${ALB_DNS_NAME}"
          api_domain="${API_DOMAIN_NAME}"

          echo "Verifying ECR image exists: ${repo_name}:${tag}"
          aws ecr describe-images \
            --region "${region}" \
            --repository-name "${repo_name}" \
            --image-ids imageTag="${tag}" >/dev/null

          desired="$(aws autoscaling describe-auto-scaling-groups \
            --region "${region}" \
            --auto-scaling-group-names "${asg}" \
            --query 'AutoScalingGroups[0].DesiredCapacity' \
            --output text)"
          if [ -z "${desired}" ] || [ "${desired}" = "None" ]; then
            echo "ERROR: Could not determine ASG desired capacity."
            exit 1
          fi
          echo "ASG desired capacity: ${desired}"

          # If custom domain is enabled, verify against it (TLS-valid). Otherwise, hit ALB DNS and ignore cert mismatch.
          if [ -n "${api_domain}" ] && [ "${api_domain}" != "null" ]; then
            health_url="https://${api_domain}/health"
            curl_flags=(--fail --show-error --silent --location --max-time 10)
          else
            health_url="https://${alb_dns}/health"
            curl_flags=(--fail --show-error --silent --location --max-time 10 -k)
          fi
          echo "Health check URL: ${health_url}"

          # Up to 2 attempts: initial wait, then (if still unhealthy) force another refresh to repull/start containers.
          for attempt in 1 2; do
            echo "Waiting for Target Group to become healthy (attempt ${attempt}/2)..."
            for i in $(seq 1 60); do
              states="$(aws elbv2 describe-target-health \
                --region "${region}" \
                --target-group-arn "${tg_arn}" \
                --query 'TargetHealthDescriptions[*].TargetHealth.State' \
                --output text || true)"

              healthy_count="$(echo "${states}" | tr '\t' '\n' | grep -c '^healthy$' || true)"
              total_count="$(echo "${states}" | tr '\t' '\n' | grep -c '^[a-z]' || true)"
              echo "Target states: ${states:-<none>} (healthy=${healthy_count}, total=${total_count}, desired=${desired})"

              if [ "${healthy_count}" -ge "${desired}" ] && [ "${desired}" -gt 0 ]; then
                echo "All desired targets are healthy."
                break
              fi
              sleep 10
            done

            echo "Calling /health..."
            if curl "${curl_flags[@]}" "${health_url}" >/dev/null; then
              echo "Health check OK."
              exit 0
            fi

            echo "Health check failed."
            aws elbv2 describe-target-health --region "${region}" --target-group-arn "${tg_arn}" --output table || true
            aws autoscaling describe-scaling-activities --region "${region}" --auto-scaling-group-name "${asg}" --max-items 10 --output table || true

            if [ "${attempt}" -eq 1 ] && [ "${ROLLING_REFRESH_STARTED:-false}" = "true" ]; then
              echo "Forcing another instance refresh to repull/start the image..."
              refresh_id="$(aws autoscaling start-instance-refresh \
                --region "${region}" \
                --auto-scaling-group-name "${asg}" \
                --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 90}' \
                --query 'InstanceRefreshId' \
                --output text)"
              echo "Instance Refresh ID: ${refresh_id}"
              while true; do
                status="$(aws autoscaling describe-instance-refreshes \
                  --region "${region}" \
                  --auto-scaling-group-name "${asg}" \
                  --instance-refresh-ids "${refresh_id}" \
                  --query 'InstanceRefreshes[0].Status' \
                  --output text)"
                pct="$(aws autoscaling describe-instance-refreshes \
                  --region "${region}" \
                  --auto-scaling-group-name "${asg}" \
                  --instance-refresh-ids "${refresh_id}" \
                  --query 'InstanceRefreshes[0].PercentageComplete' \
                  --output text)"
                echo "Refresh status: ${status} (${pct}% complete)..."
                case "${status}" in
                  Successful) echo "Refresh successful."; break ;;
                  Failed|Cancelled|TimedOut)
                    echo "Refresh ${status}."
                    aws autoscaling describe-instance-refreshes --region "${region}" --auto-scaling-group-name "${asg}" --instance-refresh-ids "${refresh_id}" --output table || true
                    break ;;
                  *) sleep 30 ;;
                esac
              done
            elif [ "${attempt}" -eq 1 ]; then
              echo "Skipping forced instance refresh because this deploy is bootstrapping the ASG for the first time."
            fi
          done

          echo "ERROR: Rollout verification failed after retries."
          exit 1
