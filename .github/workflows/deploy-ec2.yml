name: Deploy (EC2)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: false

env:
  TF_DIR: .github/terraform
  CONTAINER_NAME: aws-fcj-backend

jobs:
  #Terraform build EC2 and ECR
  terraform:
    name: Provision/Update EC2 (Terraform apply)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      asg_name: ${{ steps.tf_output.outputs.asg_name }}
      aws_region: ${{ steps.tf_output.outputs.aws_region }}
      ecr_repository_url: ${{ steps.tf_output.outputs.ecr_repository_url }}
      backend_port: ${{ steps.tf_output.outputs.backend_port }}
      ecr_tag_immutable: ${{ steps.ecr_vars.outputs.ecr_tag_immutable }}
      backend_env_parameter_name: ${{ steps.tf_output.outputs.backend_env_parameter_name }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-1
      TERRAFORM_VARS: ${{ secrets.TERRAFORM_VARIABLES }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.10.0"

      - name: Write terraform.tfvars from secret
        working-directory: ${{ env.TF_DIR }}
        run: printf "%s\n" "$TERRAFORM_VARS" > terraform.tfvars

      - name: Read ECR tag immutability (ecr_tag_immutable)
        id: ecr_vars
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail

          IMMUTABLE=""
          if [ -f terraform.tfvars ]; then
            IMMUTABLE="$(awk -F= '
              $1 ~ /^[[:space:]]*ecr_tag_immutable[[:space:]]*$/ {
                v=$2
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                gsub(/\"/, "", v)
                print v
                exit
              }' terraform.tfvars || true)"
          fi

          IMMUTABLE="${IMMUTABLE:-true}"
          case "$IMMUTABLE" in
            true|false) ;;
            *) echo "Invalid ecr_tag_immutable value: $IMMUTABLE" >&2; exit 1 ;;
          esac

          echo "ecr_tag_immutable=$IMMUTABLE" >> "$GITHUB_OUTPUT"

      #Terraform Init & AWS credentials config
      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      #Check ECR's state in Terraform's state file (ecr_repository_name)
      - name: Import existing ECR repository (if already created)
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail

          if [ -f terraform.tfvars ]; then
            REPO_NAME="$(awk -F= '
              $1 ~ /^[[:space:]]*ecr_repository_name[[:space:]]*$/ {
                v=$2
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                gsub(/\"/, "", v)
                print v
                exit
              }' terraform.tfvars || true)"
          fi

          REPO_NAME="${REPO_NAME:-edutrust-backend}"
          echo "Target ECR repo: $REPO_NAME"

          # Remove any stale state entry first (idempotent)
          terraform state rm aws_ecr_repository.backend >/dev/null 2>&1 || true

          # Import with the repo name passed explicitly as a variable
          echo "Importing ECR repo '$REPO_NAME' into Terraform state..."
          terraform import \
            -var="ecr_repository_name=${REPO_NAME}" \
            aws_ecr_repository.backend "$REPO_NAME" \
            || echo "Import failed (repo may not exist yet). Terraform apply will create it."

      #Apply main.tf
      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs (ASG + region + port)
        id: tf_output
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "asg_name=$(terraform output -raw asg_name)" >> "$GITHUB_OUTPUT"
          echo "aws_region=$(terraform output -raw aws_region)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "backend_port=$(terraform output -raw backend_port)" >> "$GITHUB_OUTPUT"
          echo "backend_env_parameter_name=$(terraform output -raw backend_env_parameter_name)" >> "$GITHUB_OUTPUT"

  #Build & Push backend image into ECR
  build:
    name: Build & Push backend image (ECR)
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image: ${{ steps.image_vars.outputs.image }}
      image_tag: ${{ steps.image_vars.outputs.image_tag }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ needs.terraform.outputs.aws_region }}
      AWS_DEFAULT_REGION: ${{ needs.terraform.outputs.aws_region }}
      ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.ecr_repository_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set image variables
        id: image_vars
        run: |
          echo "image=${ECR_REPOSITORY_URL}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ needs.terraform.outputs.aws_region }}

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@261fc3d4806db1fa66a15cc11113c456db8870a7 # v2

      - name: Compute Docker tags
        id: docker_tags
        run: |
          set -euo pipefail

          SHA_TAG="${{ steps.image_vars.outputs.image }}:${{ steps.image_vars.outputs.image_tag }}"
          if [ "${{ needs.terraform.outputs.ecr_tag_immutable }}" = "true" ]; then
            TAGS="$SHA_TAG"
          else
            TAGS="$SHA_TAG\n${{ steps.image_vars.outputs.image }}:latest"
          fi

          {
            echo "tags<<EOF"
            printf "%b\n" "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check if image tag exists in ECR
        id: ecr_check
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ steps.image_vars.outputs.image_tag }}"
          REPO_NAME=$(basename "${ECR_REPOSITORY_URL}")
          echo "Checking ECR repo: $REPO_NAME for tag: $IMAGE_TAG"

          # Capture both stdout and stderr for diagnosis
          AWS_OUTPUT=$(aws ecr describe-images \
            --repository-name "$REPO_NAME" \
            --image-ids imageTag="$IMAGE_TAG" \
            --query 'imageDetails[0].imageTags' \
            --output text 2>&1) && AWS_EXIT=0 || AWS_EXIT=$?

          echo "AWS CLI exit code: $AWS_EXIT"
          echo "AWS CLI output: $AWS_OUTPUT"

          if [ "$AWS_EXIT" -eq 0 ]; then
            echo "Tag '$IMAGE_TAG' already exists in ECR. Skipping build and push."
            echo "should_push=false" >> "$GITHUB_OUTPUT"
          elif echo "$AWS_OUTPUT" | grep -qiE "ImageNotFoundException|does not exist"; then
            echo "Tag '$IMAGE_TAG' not found in ECR. Will build and push."
            echo "should_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected AWS error while checking ECR tag. Failing to avoid pushing over an immutable tag."
            echo "$AWS_OUTPUT"
            exit 1
          fi

      - name: Build and push Docker image
        if: steps.ecr_check.outputs.should_push == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}

  #Pull backend container from ECR and deploy on EC2 by SSM Agent
  deploy:
    name: Deploy backend via ASG Refresh
    runs-on: ubuntu-latest
    needs: [terraform, build]
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ needs.terraform.outputs.aws_region }}

      - name: Update SSM Parameter (.env)
        env:
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
          PARAM_NAME: ${{ needs.terraform.outputs.backend_env_parameter_name }}
        run: |
          set -euo pipefail
          echo "Updating SSM Parameter: $PARAM_NAME"
          aws ssm put-parameter \
            --name "$PARAM_NAME" \
            --value "$BACKEND_ENV_FILE" \
            --type "SecureString" \
            --overwrite

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.10.0"

      - name: Write terraform.tfvars from secret
        working-directory: ${{ env.TF_DIR }}
        env:
          TERRAFORM_VARS: ${{ secrets.TERRAFORM_VARIABLES }}
        run: printf "%s\n" "$TERRAFORM_VARS" > terraform.tfvars

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Apply (Trigger ASG Instance Refresh)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="backend_image_tag=${{ github.sha }}"

      - name: Wait for ASG Instance Refresh
        run: |
          set -euo pipefail
          ASG_NAME="${{ needs.terraform.outputs.asg_name }}"
          echo "Monitoring Instance Refresh for $ASG_NAME..."

          NONE_COUNT=0

          for i in {1..20}; do
            # AWS CLI exits 0 with empty string when no refreshes exist (not "None")
            # Use || echo "EMPTY" only as true fallback for CLI errors
            RAW_STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --query 'InstanceRefreshes[0].Status' \
              --output text 2>/dev/null) || RAW_STATUS="CLI_ERROR"

            # Normalize: empty string or "None" from AWS CLI both mean "no refresh"
            if [ -z "$RAW_STATUS" ] || [ "$RAW_STATUS" = "None" ] || [ "$RAW_STATUS" = "null" ]; then
              STATUS="NONE"
            else
              STATUS="$RAW_STATUS"
            fi

            echo "Check $i/20 — status: $STATUS"

            case "$STATUS" in
              Successful)
                echo "Deployment Successful!"
                exit 0
                ;;
              Failed|Cancelled)
                echo "Deployment $STATUS!"
                exit 1
                ;;
              InProgress|Pending|RollbackInProgress|RollbackSuccessful)
                echo "Refresh in progress, waiting..."
                NONE_COUNT=0
                ;;
              NONE)
                NONE_COUNT=$((NONE_COUNT + 1))
                echo "No active refresh (${NONE_COUNT}/2 checks)."
                if [ "$NONE_COUNT" -ge 2 ]; then
                  echo "No instance refresh was started. Considering deployment complete."
                  exit 0
                fi
                ;;
              CLI_ERROR)
                echo "AWS CLI error occurred while checking status."
                ;;
              *)
                echo "Unknown status: $STATUS"
                ;;
            esac
            sleep 15
          done
          echo "Wait timed out, but refresh may still be in progress."
