name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/terraform/**"
      - ".github/workflows/deploy-terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-deploy-main
  cancel-in-progress: false

env:
  TF_DIR: .github/terraform
  TF_STATE_BUCKET: backend-tf-state-bucket-641458060045
  TF_STATE_REGION: ap-southeast-1

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    env:
      TERRAFORM_VARS: ${{ secrets.TERRAFORM_VARIABLES }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ env.TF_STATE_REGION }}
      AWS_DEFAULT_REGION: ${{ env.TF_STATE_REGION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.TF_STATE_REGION }}

      - name: Terraform Format Check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Write terraform.tfvars from secret
        working-directory: ${{ env.TF_DIR }}
        run: printf "%s\n" "$TERRAFORM_VARS" > terraform.tfvars

      - name: Ensure Terraform State Bucket Exists
        shell: bash
        run: |
          set -euo pipefail

          bucket="${TF_STATE_BUCKET}"
          region="${TF_STATE_REGION}"

          echo "Checking Terraform state bucket: ${bucket}"
          # Use us-east-1/global endpoint for existence check (avoids false negatives due to region redirects).
          if aws s3api head-bucket --bucket "${bucket}" --region us-east-1 2>/dev/null; then
            echo "Bucket exists, skipping create."
          else
            echo "Bucket missing, creating: ${bucket} (region: ${region})"
            if [ "${region}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${bucket}" --region "${region}"
            else
              aws s3api create-bucket \
                --bucket "${bucket}" \
                --region "${region}" \
                --create-bucket-configuration LocationConstraint="${region}"
            fi
          fi

          # Hardening / best practices for state storage.
          aws s3api put-public-access-block \
            --bucket "${bucket}" \
            --public-access-block-configuration '{
              "BlockPublicAcls": true,
              "IgnorePublicAcls": true,
              "BlockPublicPolicy": true,
              "RestrictPublicBuckets": true
            }'

          aws s3api put-bucket-versioning \
            --bucket "${bucket}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${bucket}" \
            --server-side-encryption-configuration '{
              "Rules": [
                {
                  "ApplyServerSideEncryptionByDefault": { "SSEAlgorithm": "AES256" }
                }
              ]
            }'

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      
