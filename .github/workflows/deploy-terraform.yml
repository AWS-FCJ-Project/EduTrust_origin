name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/terraform/**"
      - ".github/workflows/deploy-terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-deploy-main
  cancel-in-progress: false

env:
  TF_DIR: .github/terraform

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    env:
      TERRAFORM_VARS: ${{ secrets.TERRAFORM_VARIABLES }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform Format Check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Write terraform.tfvars from secret
        working-directory: ${{ env.TF_DIR }}
        run: printf "%s\n" "$TERRAFORM_VARS" > terraform.tfvars

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      
